services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - /srv/rehoboam/infra/loki-config.yml:/etc/loki/local-config.yaml
      - /srv/rehoboam/data/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - logging

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: fluent-bit
    restart: unless-stopped
    user: root
    privileged: true
    ports:
      - "24224:24224"
    volumes:
      - /srv/rehoboam/infra/fluent-bit/fluent-bit.yaml:/fluent-bit/etc/fluent-bit.yaml
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/log/journal-export:/var/log/journal-export:ro
    command: /fluent-bit/bin/fluent-bit -c /fluent-bit/etc/fluent-bit.yaml
    depends_on:
      - loki
    networks:
      - logging

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.vincents.systems
      - GF_DEFAULT_UI_TIMEZONE=browser
      - TZ=Asia/Kolkata
    volumes:
      - /srv/rehoboam/data/grafana:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - logging

networks:
  logging:
    driver: bridge
