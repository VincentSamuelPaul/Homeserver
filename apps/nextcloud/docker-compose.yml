services:
  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_POSTGRES_PASSWORD}
    volumes:
      - /srv/rehoboam/data/nextcloud/db:/var/lib/postgresql/data
    networks:
      - nextcloud

  nextcloud-redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    networks:
      - nextcloud

  nextcloud:
    image: nextcloud:fpm-alpine
    container_name: nextcloud
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=vincent
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=files.vincents.systems 172.17.0.1
      - REDIS_HOST=nextcloud-redis
    volumes:
      - /srv/rehoboam/data/nextcloud/data:/var/www/html
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    networks:
      - nextcloud

  nextcloud-nginx:
    image: nginx:alpine
    container_name: nextcloud-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - /srv/rehoboam/data/nextcloud/data:/var/www/html
      - /srv/rehoboam/infra/nextcloud-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextcloud
    networks:
      - nextcloud

networks:
  nextcloud:
    driver: bridge
