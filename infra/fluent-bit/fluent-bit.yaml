service:
  flush: 5
  log_level: info

pipeline:
  inputs:
    - name: forward
      tag: docker.*
      listen: 0.0.0.0
      port: 24224

    - name: systemd
      tag: systemd.*
      read_from_tail: true
      strip_underscores: true

  filters:
    - name: grep
      match: "docker.*"
      exclude: container_name /fluent-bit/

    - name: record_modifier
      match: "*"
      record:
        - host forge
        - environment homelab

  outputs:
    - name: loki
      match: "*"
      host: 172.17.0.1
      port: 3100
      labels: job=fluent-bit
      label_keys: $container_name,$SYSLOG_IDENTIFIER
      line_format: json
