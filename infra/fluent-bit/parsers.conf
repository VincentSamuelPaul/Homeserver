[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

[PARSER]
    Name        nginx
    Format      regex
    Regex       ^(?<remote>[^ ]*) [^ ]* (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<status>[^ ]*) (?<size>[^ ]*)
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

[PARSER]
    Name        sshd
    Format      regex
    Regex       ^(?<time>[^ ]* [^ ]*) (?<host>[^ ]*) sshd\[(?<pid>[0-9]+)\]: (?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
